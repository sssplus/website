import React from 'react';

const Header = () => {
  return (
    <header className='bg-[#003366] border-b border-gray-700'>
      <div className='max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4'>
        <nav className='flex items-center justify-between'>
          <div className='flex items-center gap-2'>
            <div className='w-10 h-10 bg-[#FF5722] flex items-center justify-center'>
              <span className='text-white font-bold text-xl'>P</span>
            </div>
            <div className='flex flex-col'>
              <span className='text-white font-bold text-lg leading-tight'>PRIMEBRIO INDUSTRIES</span>
              <span className='text-gray-300 text-xs'>Pvt Ltd</span>
            </div>
          </div>
          <div className='hidden md:flex items-center gap-8'>
            <a href='#capabilities' className='text-gray-300 hover:text-white transition-colors text-sm font-medium'>
              Capabilities
            </a>
            <a href='#quality' className='text-gray-300 hover:text-white transition-colors text-sm font-medium'>
              Quality
            </a>
            <a href='#inquiry' className='text-gray-300 hover:text-white transition-colors text-sm font-medium'>
              Request Quote
            </a>
          </div>
        </nav>
      </div>
    </header>
  );
};

export default Header;
